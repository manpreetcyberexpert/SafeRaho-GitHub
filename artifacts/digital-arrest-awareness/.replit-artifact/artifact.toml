kind = "web"
previewPath = "/"
title = "Digital Arrest Fraud Protection"
version = "1.0.0"
id = "artifacts/digital-arrest-awareness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23188

[services.development]
run = "pnpm --filter @workspace/digital-arrest-awareness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-arrest-awareness", "run", "build" ]
publicDir = "artifacts/digital-arrest-awareness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23188"
BASE_PATH = "/"
